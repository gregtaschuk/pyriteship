      // NFC cards write bare /tools/<hex> URLs; rewrite into the hash router.
      (function () {
        var p = window.location.pathname;
        if (p !== '/' && !window.location.hash) {
          window.location.replace('/#' + p + window.location.search);
        }
      })();
